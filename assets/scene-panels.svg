<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Painéis solares em destaque">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3fb4c6"/><stop offset="1" stop-color="#d2efed"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0e3a44"/><stop offset="1" stop-color="#06181f"/></linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#eaf7a8"/><stop offset="1" stop-color="#84cc16"/></radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <circle cx="640" cy="90" r="100" fill="#a3e635" opacity="0.2"/>
  <circle cx="640" cy="90" r="56" fill="url(#sun)"/>
  <rect y="300" width="800" height="200" fill="#0d9488"/>
  <g transform="translate(40,180)">
    <g transform="skewY(-9)">
      <rect x="0" y="0" width="720" height="240" rx="10" fill="url(#panel)"/>
      <g stroke="#2dd4bf" stroke-width="3" opacity="0.55"><line x1="144" y1="0" x2="144" y2="240"/><line x1="288" y1="0" x2="288" y2="240"/><line x1="432" y1="0" x2="432" y2="240"/><line x1="576" y1="0" x2="576" y2="240"/><line x1="0" y1="60" x2="720" y2="60"/><line x1="0" y1="120" x2="720" y2="120"/><line x1="0" y1="180" x2="720" y2="180"/></g>
      <rect x="0" y="0" width="720" height="240" rx="10" fill="none" stroke="#84cc16" stroke-width="7"/>
      <polygon points="10,12 150,12 60,228 10,228" fill="#ffffff" opacity="0.08"/>
    </g>
  </g>
</svg>
